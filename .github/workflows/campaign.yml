name: TradeFlow Campaign Runner

on:
  # schedule:
  #   - cron: '0 9 * * *'
  workflow_dispatch:

  # Allow manual trigger — optionally scoped to one client
  workflow_dispatch:
    inputs:
      client_id:
        description: 'Client UUID (leave empty to run for all clients)'
        required: false
        type: string

jobs:
  run-campaign:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install

      - name: Run TradeFlow Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          GOOGLE_MAPS_API_KEY: ${{ secrets.GOOGLE_MAPS_API_KEY }}
          COMPANIES_HOUSE_API_KEY: ${{ secrets.COMPANIES_HOUSE_API_KEY }}
          CLIENT_ID: ${{ github.event.inputs.client_id }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
        run: node src/index.js
